<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>TFT PRO MAX</title>
<style>
body { background:#111; color:white; font-family:Arial; text-align:center;}
.board { display:grid; grid-template-columns: repeat(6,60px); gap:5px; justify-content:center; margin:20px;}
.cell { width:60px; height:60px; background:#222; border:1px solid #444; display:flex; align-items:center; justify-content:center; font-size:10px;}
.controls { margin:10px;}
.log { height:150px; overflow:auto; border:1px solid #444; padding:5px;}
</style>
</head>
<body>

<h1>TFT PRO MAX</h1>

<div class="controls">
<select id="champSelect"></select>
<button onclick="selectChamp()">Chọn tướng</button>
<button onclick="startFight()">⚔️ Fight</button>
</div>

<div class="board" id="board"></div>

<h3>Log</h3>
<div class="log" id="log"></div>

<script>
// ===== DATA =====
const champs = [
{ name:"Yasuo", hp:1000, ad:80, mana:0, maxMana:50, trait:"Duelist", skill:(c,t)=>{t.hp-=150;} },
{ name:"Garen", hp:1300, ad:60, mana:0, maxMana:60, trait:"Tank", skill:(c,t)=>{c.hp+=100;} },
{ name:"Ashe", hp:800, ad:100, mana:0, maxMana:40, trait:"Archer", skill:(c,t)=>{t.hp-=200;} },
{ name:"Zed", hp:900, ad:110, mana:0, maxMana:30, trait:"Assassin", skill:(c,t)=>{t.hp-=250;} }
];

let selected = null;
let board = Array(36).fill(null);

// ===== INIT BOARD =====
const boardDiv = document.getElementById("board");
for(let i=0;i<36;i++){
  let div=document.createElement("div");
  div.className="cell";
  div.onclick=()=>placeChamp(i);
  boardDiv.appendChild(div);
}

// ===== SELECT =====
const sel=document.getElementById("champSelect");
champs.forEach((c,i)=>{
  let o=document.createElement("option");
  o.value=i;
  o.text=c.name;
  sel.appendChild(o);
});

function selectChamp(){
  selected = JSON.parse(JSON.stringify(champs[sel.value]));
}

// ===== PLACE =====
function placeChamp(i){
  if(selected){
    board[i]=JSON.parse(JSON.stringify(selected));
    render();
  }
}

// ===== RENDER =====
function render(){
  [...boardDiv.children].forEach((cell,i)=>{
    cell.innerText = board[i]?board[i].name:"";
  });
}

// ===== HELPERS =====
function log(msg){
  document.getElementById("log").innerHTML += msg+"<br>";
}

// ===== FIND TARGET =====
function getTarget(i){
  for(let j=0;j<36;j++){
    if(board[j] && j!==i) return board[j];
  }
  return null;
}

// ===== TRAIT BONUS =====
function applyTraits(){
  let count={};
  board.forEach(c=>{
    if(c) count[c.trait]=(count[c.trait]||0)+1;
  });

  board.forEach(c=>{
    if(c && count[c.trait]>=2){
      c.ad*=1.2;
    }
  });
}

// ===== COMBAT LOOP =====
function startFight(){
  log("=== BẮT ĐẦU ===");
  applyTraits();

  let tick=0;
  let interval=setInterval(()=>{
    tick++;
    board.forEach((c,i)=>{
      if(!c) return;

      let target=getTarget(i);
      if(!target) return;

      // attack
      target.hp -= c.ad;
      c.mana += 10;
      log(c.name+" đánh "+target.name);

      // skill
      if(c.mana>=c.maxMana){
        c.skill(c,target);
        c.mana=0;
        log("🔥 "+c.name+" tung skill!");
      }

      if(target.hp<=0){
        log("💀 "+target.name+" chết");
        board[board.indexOf(target)] = null;
      }
    });

    render();

    let alive = board.filter(x=>x).length;
    if(alive<=1 || tick>50){
      clearInterval(interval);
      log("=== KẾT THÚC ===");
    }

  },500);
}

</script>

</body>
</html>
